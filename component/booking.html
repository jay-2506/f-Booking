<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Booking System - Book Slot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <i class="fa-solid fa-dharmachakra"></i>
                Bhagti Marg
            </a>
            <button class="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav-links">
                <a href="index.html" class="nav-item">Home</a>
                <a href="temples.html" class="nav-item">Temples</a>
                <a href="booking.html" class="nav-item active">Bookings</a>
            </div>
            <div class="nav-buttons" id="auth-buttons">
                <!-- Managed by target script.js -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5" style="background-color: var(--light-bg);">
        <div class="container" style="max-width: 800px;">
            <div class="card" style="padding: 40px;">
                <h1 style="text-align: center; margin-bottom: 30px;">Book Darshan Slot</h1>

                <!-- Require Auth Notice -->
                <div id="authNotice" class="text-center" style="display: none; padding: 20px;">
                    <i class="fa-solid fa-lock"
                        style="font-size: 3rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                    <h3 style="margin-bottom: 10px;">Login Required</h3>
                    <p style="color: var(--text-muted); margin-bottom: 20px;">Please login or register to book a slot
                        for temple darshan.</p>
                    <a href="login.html" class="btn">Login</a>
                </div>

                <form id="bookingForm" style="display: none;">
                    <div id="bookingResult"
                        style="padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none;">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="templeSelect">Select Temple</label>
                        <select id="templeSelect" class="form-control" required>
                            <option value="">-- Choose a Temple --</option>
                            <option value="1">Golden Temple, Amritsar</option>
                            <option value="2">Kashi Vishwanath, Varanasi</option>
                            <option value="3">Somnath Temple, Gujarat</option>
                            <option value="4">Meenakshi Temple, Madurai</option>
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label class="form-label" for="bookingDate">Date of Visit</label>
                            <input type="date" id="bookingDate" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="bookingTime">Preferred Time Slot</label>
                            <select id="bookingTime" class="form-control" required>
                                <option value="">-- Select Time --</option>
                                <option value="06:00-08:00">06:00 AM - 08:00 AM</option>
                                <option value="08:00-10:00">08:00 AM - 10:00 AM</option>
                                <option value="10:00-12:00">10:00 AM - 12:00 PM</option>
                                <option value="16:00-18:00">04:00 PM - 06:00 PM</option>
                                <option value="18:00-20:00">06:00 PM - 08:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="numDevotees">Number of Devotees</label>
                        <input type="number" id="numDevotees" class="form-control" min="1" max="10" value="1" required>
                    </div>

                    <button type="submit" id="submitBookingBtn" class="btn"
                        style="width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem;">
                        Confirm Booking
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="padding-top: 0; border: none;">
                &copy; 2024 Bhagti Marg. Built for College Project. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check auth
            if (!STATE.token) {
                document.getElementById('authNotice').style.display = 'block';
                return;
            }

            document.getElementById('bookingForm').style.display = 'block';

            // Auto-select temple if ID is in URL
            const urlParams = new URLSearchParams(window.location.search);
            const templeId = urlParams.get('templeId');
            if (templeId) {
                const select = document.getElementById('templeSelect');
                const option = Array.from(select.options).find(opt => opt.value === templeId);
                if (option) {
                    select.value = templeId;
                }
            }

            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bookingDate').setAttribute('min', today);

            // Handle Form Submit
            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submitBookingBtn');
                const resultDiv = document.getElementById('bookingResult');

                const payload = {
                    templeId: document.getElementById('templeSelect').value,
                    date: document.getElementById('bookingDate').value,
                    timeSlot: document.getElementById('bookingTime').value,
                    devotees: document.getElementById('numDevotees').value
                };

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
                resultDiv.style.display = 'none';

                try {
                    // API Call
                    // const response = await apiRequest('/bookings', { method: 'POST', body: JSON.stringify(payload) });

                    // MOCK DELAY for Presentation
                    await new Promise(res => setTimeout(res, 1000));

                    resultDiv.style.display = 'block';
                    resultDiv.style.backgroundColor = '#d1fae5';
                    resultDiv.style.color = '#065f46';
                    resultDiv.style.border = '1px solid #34d399';
                    resultDiv.innerHTML = '<i class="fa-solid fa-check-circle"></i> Booking confirmed successfully! Redirecting...';

                    setTimeout(() => {
                        window.location.href = 'my-bookings.html';
                    }, 2000);

                } catch (error) {
                    console.error('Booking error:', error);
                    resultDiv.style.display = 'block';
                    resultDiv.style.backgroundColor = '#fee2e2';
                    resultDiv.style.color = '#991b1b';
                    resultDiv.style.border = '1px solid #f87171';
                    resultDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${error.message || 'Failed to book slot. Please try again.'}`;
                } finally {
                    if (!resultDiv.innerHTML.includes('Redirecting')) {
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Confirm Booking';
                    }
                }
            });
        });
    </script>
</body>

</html>
